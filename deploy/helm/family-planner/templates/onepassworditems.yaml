{{- if .Values.onepassword.enabled }}
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: {{ include "family-planner.dbSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "family-planner.labels" . | nindent 4 }}
  annotations:
    operator.1password.io/auto-restart: "true"
spec:
  itemPath: {{ required "onepassword.plannerDbItemPath required" .Values.onepassword.plannerDbItemPath | quote }}
{{- end }}
