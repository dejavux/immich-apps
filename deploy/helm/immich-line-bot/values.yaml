replicaCount: 1

image:
  repository: registry-internal.3q.fi/immich-line-bot
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: registry-secret

nameOverride: ""
fullnameOverride: immich-line-bot

serviceAccount:
  create: false
  name: ""

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Caddy 終止對外 HTTPS；Caddy→ingress 為 HTTP。勿 308 challenge 到 HTTPS。
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  host: immich-bot.3q.fi
  path: /
  pathType: Prefix
  tls:
    enabled: true
    secretName: immich-bot-3q-fi-tls

env:
  nodeEnv: production
  logLevel: info
  immichLineAlbumName: LINE Inbox
  assetMetadataWaitMs: "8000"
  photoSearchEnabled: "true"
  qwenBaseUrl: "http://qwen-coder.local-llm.svc.cluster.local:8001/v1"
  qwenModel: default
  qwenTimeoutMs: "30000"
  searchMaxResults: "5"
  searchAgeWindowDays: "45"
  searchSessionTtlMs: "1800000"
  searchPersonAliases: "小蕊:rayna"
  # Cluster-internal Immich API (same namespace)
  immichBaseUrl: http://immich-server:2283
  immichWebUrl: https://immich.3q.fi
  lineBotPublicUrl: https://immich-bot.3q.fi

onepassword:
  enabled: true
  # immich namespace Connect 僅授權 Infra-Platform（同 Immich-PostgreSQL）
  lineBotItemPath: vaults/Infra-Platform/items/Immich-LINE-Bot
  immichApiItemPath: vaults/Infra-Platform/items/Immich-API-Key

secretKeys:
  lineChannelSecret: channel-secret
  lineAccessToken: access-token
  immichApiKey: api-key

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Prometheus pod annotations（cluster Prometheus 需 scrape /metrics）
serviceMonitor:
  enabled: true
  createResource: false
  podAnnotations: true
  interval: 30s
  scrapeTimeout: 10s
