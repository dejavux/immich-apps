apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich-line-bot.fullname" . }}
  labels:
    {{- include "immich-line-bot.labels" . | nindent 4 }}
  {{- if .Values.onepassword.enabled }}
  annotations:
    operator.1password.io/auto-restart: "true"
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "immich-line-bot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich-line-bot.selectorLabels" . | nindent 8 }}
      {{- if and .Values.serviceMonitor.enabled .Values.serviceMonitor.podAnnotations }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.targetPort | quote }}
        prometheus.io/path: "/metrics"
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.name }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: {{ .Values.env.nodeEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.logLevel | quote }}
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            - name: IMMICH_BASE_URL
              value: {{ .Values.env.immichBaseUrl | quote }}
            - name: IMMICH_WEB_URL
              value: {{ .Values.env.immichWebUrl | quote }}
            - name: LINE_BOT_PUBLIC_URL
              value: {{ .Values.env.lineBotPublicUrl | quote }}
            - name: LINE_CHANNEL_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "immich-line-bot.lineBotSecretName" . }}
                  key: {{ .Values.secretKeys.lineChannelSecret }}
            - name: LINE_CHANNEL_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "immich-line-bot.lineBotSecretName" . }}
                  key: {{ .Values.secretKeys.lineAccessToken }}
            - name: IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "immich-line-bot.immichApiSecretName" . }}
                  key: {{ .Values.secretKeys.immichApiKey }}
            - name: IMMICH_LINE_ALBUM_NAME
              value: {{ .Values.env.immichLineAlbumName | quote }}
            - name: ASSET_METADATA_WAIT_MS
              value: {{ .Values.env.assetMetadataWaitMs | quote }}
            - name: PHOTO_SEARCH_ENABLED
              value: {{ .Values.env.photoSearchEnabled | quote }}
            - name: QWEN_BASE_URL
              value: {{ .Values.env.qwenBaseUrl | quote }}
            - name: QWEN_MODEL
              value: {{ .Values.env.qwenModel | quote }}
            - name: QWEN_TIMEOUT_MS
              value: {{ .Values.env.qwenTimeoutMs | quote }}
            - name: SEARCH_MAX_RESULTS
              value: {{ .Values.env.searchMaxResults | quote }}
            - name: SEARCH_AGE_WINDOW_DAYS
              value: {{ .Values.env.searchAgeWindowDays | quote }}
            - name: SEARCH_SESSION_TTL_MS
              value: {{ .Values.env.searchSessionTtlMs | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
