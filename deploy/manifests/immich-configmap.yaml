apiVersion: v1
kind: ConfigMap
metadata:
  name: immich-nginx-config
  namespace: immich
  labels:
    app: immich-proxy
data:
  default.conf: |
    upstream immich {
      server immich-server:2283;
    }

    # upstream immich-machine-learning {
    #   server immich-machine-learning:3003;
    # }

    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80;
      server_name _;
      client_max_body_size 50000M;

      # Proxy to Immich Server
      location /api {
        proxy_pass http://immich;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }

      # Proxy to Immich Machine Learning (disabled - service not deployed)
      # location /predictions {
      #   proxy_pass http://immich-machine-learning;
      #   proxy_set_header Host $host;
      #   proxy_set_header X-Real-IP $remote_addr;
      #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      #   proxy_set_header X-Forwarded-Proto $scheme;
      #   proxy_set_header X-Forwarded-Host $host;
      #   proxy_set_header X-Forwarded-Port $server_port;

      #   # Timeouts
      #   proxy_connect_timeout 60s;
      #   proxy_send_timeout 60s;
      #   proxy_read_timeout 60s;
      # }

      # Serve uploaded files
      location /upload {
        alias /usr/share/nginx/html/upload;
        autoindex on;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # CORS headers for web access
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";

        if ($request_method = 'OPTIONS') {
          add_header Access-Control-Allow-Origin "*";
          add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
          add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range";
          add_header Access-Control-Max-Age 1728000;
          add_header Content-Type 'text/plain; charset=utf-8';
          add_header Content-Length 0;
          return 204;
        }
      }

      # Default location - proxy to server
      location / {
        proxy_pass http://immich;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
      }
    }
