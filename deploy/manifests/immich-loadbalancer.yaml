# MetalLB：須先 kubectl apply -f metallb-immich-pool.yaml（192.168.50.156/32）
# 與 60_apps/caddy/services/loadbalancer.yaml 中 immich.3q.fi → :156 一致
apiVersion: v1
kind: Service
metadata:
  name: immich-loadbalancer
  namespace: immich
  labels:
    app: immich
  annotations:
    metallb.universe.tf/allow-shared-ip: immich-ip
    metallb.universe.tf/loadBalancerIPs: "192.168.50.156"
    metallb.universe.tf/address-pool: immich-pool
spec:
  type: LoadBalancer
  selector:
    app: immich-server
  ports:
    - name: http
      port: 80
      targetPort: 2283
      protocol: TCP
